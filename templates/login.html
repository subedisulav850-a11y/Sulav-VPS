<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sulav Hosting | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,0.15) 0%,transparent 60%)}
    .card{background:#111118;border:1px solid #1e1e2e;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 0 60px rgba(124,58,237,0.1)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#7c3aed,#5b21b6);border-radius:9px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:18px;height:18px;fill:#fff}
    .logo-text{font-size:18px;font-weight:700;color:#fff}
    .logo-sub{font-size:11px;color:#6b7280;margin-top:1px}
    h1{font-size:22px;font-weight:700;margin-bottom:6px}
    p{color:#6b7280;font-size:14px;margin-bottom:24px}
    label{display:block;font-size:13px;color:#9ca3af;margin-bottom:6px;font-weight:500}
    input{width:100%;padding:11px 14px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:8px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
    input::placeholder{color:#4b5563}
    button{width:100%;margin-top:16px;padding:12px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s,transform .1s}
    button:hover{opacity:.9}
    button:active{transform:scale(.99)}
    .note{text-align:center;margin-top:16px;font-size:12px;color:#374151}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M20 13C20 18 12 22 12 22S4 18 4 13V6L12 3L20 6V13Z"/></svg>
      </div>
      <div>
        <div class="logo-text">Sulav Hosting</div>
        <div class="logo-sub">Hosting Panel</div>
      </div>
    </div>
    <h1>Welcome back</h1>
    <p>Enter your username to access the dashboard</p>
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
      <button type="submit">Enter Dashboard</button>
    </form>
    <div class="note">No password needed — just your username</div>
  </div>
</body>
</html>
